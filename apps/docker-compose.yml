services:
  mgr-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mgr_user
      POSTGRES_PASSWORD: mgr_pass
      POSTGRES_DB: mgr_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mgr_user -d mgr_db -h localhost"]
      interval: 5s
      timeout: 5s
      retries: 5

  mgr-web-cache:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - web-cachedata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mgr-web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://mgr_user:mgr_pass@mgr-db:5432/mgr_db
      CACHE_REDIS_URL: redis://mgr-web-cache:6379
      SERVER_PORT: "3000"
      NODE_ENV: production
    depends_on:
      mgr-db:
        condition: service_healthy
      mgr-web-cache:
        condition: service_healthy

  mgr-emissions-bot:
    build:
      context: ./emissions-tracker
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://mgr_user:mgr_pass@mgr-db:5432/mgr_db
      PORT: "8080"
    depends_on:
      mgr-db:
        condition: service_healthy

volumes:
  pgdata:
  web-cachedata:
